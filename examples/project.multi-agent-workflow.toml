# Example repo override for a project workflow.
# Copy to .agents/multi-agent-workflow.toml in the target repo and customize.

[agents.reviewer]
runner = "pi"
model = "openai-codex/gpt-5.6-sol"
thinking = "high"
role = "reviewer"

[agents.implementer]
runner = "pi"
model = "xai-auth/grok-4.5"
thinking = "medium"
role = "implementer"

[agents.communicator]
runner = "opencode"
model = "kimi-2.6"
thinking = "medium"
role = "committer-pr-communicator"
optional = true

[agents.ui_reviewer]
runner = "claude-code"
model = "claude.fable.high"
thinking = "high"
role = "ui-reviewer"
optional = true
trigger = "ui-related-work"

[workflow]
max_iterations = 3
push_by_default = false
comment_by_default = false
allow_committer_agent = true
require_human_before_merge = true
review_until = "approve-or-accepted-nits"

[policy]
never_force_push = true
never_address_local_review_bots_on_pr = true
comment_only_actual_results = true
preserve_user_changes = true

[repo]
default_base_branch = "development"
feature_pr_base = "development"
promotion_base = "main"
promotion_head = "development"
open_feature_prs_as_draft = true
merge_strategy = "merge"
forbid_squash_merge = true
forbid_rebase_merge = true

[repo.comments]
after_post_review_push = true
include_changes = true
include_review_points = true
include_validation = true
include_defenses_for_no_change = true

[repo.validation]
format_before_tests = true
version_check_base = "origin/development"
required_diff_check = true
precommit_on_changed_files = true

[integrations.issue_tracker]
detect = true
providers = ["linear", "jira", "github"]
branch_include_ticket_key = true
branch_ticket_key_position = "prefix"
require_ticket_links_in_pr_body = true
multiple_ticket_link_strategy = "primary-closes-secondary-refs"
default_close_keywords = ["Closes", "Fixes"]
default_reference_keyword = "Refs"
